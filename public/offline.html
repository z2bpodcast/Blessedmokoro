<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z2B — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0A0818, #1E1B4B);
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; color: #F5F3FF; text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 360px; width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(212,175,55,0.3);
      border-radius: 20px; padding: 40px 32px;
    }
    img { width: 72px; height: 72px; border-radius: 16px; border: 2px solid #D4AF37; margin: 0 auto 20px; display: block; }
    h1 { font-size: 22px; color: #D4AF37; margin-bottom: 12px; }
    p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 24px; }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #B8860B, #D4AF37);
      color: #000; border: none; border-radius: 12px;
      font-size: 15px; font-weight: bold; cursor: pointer;
      font-family: Georgia, serif;
    }
    .tag { font-size: 11px; color: rgba(212,175,55,0.4); margin-top: 16px; font-style: italic; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo.jpg" alt="Z2B" />
    <h1>You are offline</h1>
    <p>
      It looks like you have lost your internet connection.
      Check your connection and try again — your workshop progress is saved.
    </p>
    <button onclick="window.location.reload()">
      🔄 Try Again
    </button>
    <p class="tag">"The plans of the diligent lead surely to abundance." — Proverbs 21:5</p>
  </div>
</body>
</html>
